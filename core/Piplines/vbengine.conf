# VBEngine Configuration
# =======================
# Controls where training data comes from and how it's prepared.
#
# Source types: mysql | files | sqlite
#   mysql   — read from MySQL database (CODEBASE table)
#   files   — read from local directory (scan files matching extensions)
#   sqlite  — read from SQLite word_index.db (legacy compatibility)

source = mysql

# --- MySQL source settings ---
mysql_host = localhost
mysql_user = root
mysql_password =
mysql_db = CODEBASE
mysql_table = c_files
mysql_content_col = content
mysql_path_col = full_path

# --- Files source settings ---
# files_dir = /Users/wws/Qdrant_mysql_mlx_vector_engine
# files_recursive = true

# --- Tokenization ---
# File extensions to include (comma-separated, for files source)
extensions = .c,.h,.cpp,.hpp,.m,.mm,.py,.md,.txt,.sql,.sh,.json,.yaml,.yml,.bcl

# Regex for token extraction (default: identifiers)
token_regex = [A-Za-z_][A-Za-z0-9_]*

# --- Training parameters ---
dims = 128
window = 5
neg_samples = 5
min_count = 5
epochs = 5
lr_start = 0.025
lr_end = 0.0001
seed = 42

# --- Output paths ---
pairs_file = training.bin
model_file = word2vec_packed_model.bin
