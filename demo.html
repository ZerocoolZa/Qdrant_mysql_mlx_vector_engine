<script>
setInterval(() => {
    fetch(window.location.href + "?t=" + Date.now(), {cache: "no-store"})
    .then(r => r.text())
    .then(html => {
        const newBody = html.match(/<body[^>]*>([\s\S]*)<\/body>/)[1];
        if (newBody !== document.body.innerHTML) {
            document.body.innerHTML = newBody;

    });
}, 800);
