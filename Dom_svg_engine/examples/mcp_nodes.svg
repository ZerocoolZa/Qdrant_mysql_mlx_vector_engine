<?xml version='1.0' encoding='UTF-8'?>
<svg width='800' height='600' viewBox='0 0 800 600' xmlns='http://www.w3.org/2000/svg' xmlns:xlink='http://www.w3.org/1999/xlink'>
<defs>
  <filter id='glow' x='-50%' y='-50%' width='200%' height='200%'>
    <feGaussianBlur stdDeviation='4' result='blur'/>
    <feMerge>
      <feMergeNode in='blur'/>
      <feMergeNode in='SourceGraphic'/>
    </feMerge>
  </filter>
  <filter id='glow-strong' x='-50%' y='-50%' width='200%' height='200%'>
    <feGaussianBlur stdDeviation='8' result='blur'/>
    <feMerge>
      <feMergeNode in='blur'/>
      <feMergeNode in='blur'/>
      <feMergeNode in='SourceGraphic'/>
    </feMerge>
  </filter>
  <radialGradient id='magic-gradient' cx='50%' cy='50%' r='50%'>
    <stop offset='0%' stop-color='#7b2ff7' stop-opacity='0.8'/>
    <stop offset='100%' stop-color='#1a365d' stop-opacity='0'/>
  </radialGradient>
  <radialGradient id='star-gradient' cx='50%' cy='50%' r='50%'>
    <stop offset='0%' stop-color='#ffffff' stop-opacity='1'/>
    <stop offset='50%' stop-color='#7ec8ff' stop-opacity='0.6'/>
    <stop offset='100%' stop-color='#1e5eff' stop-opacity='0'/>
  </radialGradient>
  <linearGradient id='hat-gradient' x1='0%' y1='0%' x2='0%' y2='100%'>
    <stop offset='0%' stop-color='#2a1860'/>
    <stop offset='100%' stop-color='#1a0a40'/>
  </linearGradient>
  <linearGradient id='wand-gradient' x1='0%' y1='0%' x2='0%' y2='100%'>
    <stop offset='0%' stop-color='#ffd700'/>
    <stop offset='100%' stop-color='#b8860b'/>
  </linearGradient>
  <linearGradient id='coat-gradient' x1='0%' y1='0%' x2='0%' y2='100%'>
    <stop offset='0%' stop-color='#1e5eff'/>
    <stop offset='100%' stop-color='#0a2060'/>
  </linearGradient>
  <radialGradient id='rune-gradient' cx='50%' cy='50%' r='50%'>
    <stop offset='0%' stop-color='#00ffff' stop-opacity='0.8'/>
    <stop offset='100%' stop-color='#0088ff' stop-opacity='0'/>
  </radialGradient>
</defs>
