#
# This is the single source of truth for resource limits.
# coretotch_fix.c reads this file at startup.
# Env vars (SAFE_RAM_GB, SAFE_RAM_WARN_GB) override these values if set.
#
# Mirrors: core/Dom_Unified/Config.py AGENT_MIN_RAM_GB, AGENT_MAX_CPU_PERCENT, DOM_RAM_BUDGET_GB

# RAM limits (in GB) — pause training if free RAM drops below this
MIN_RAM_GB = 0.5
WARN_RAM_GB = 1.0

# Disk limits (in MB) — abort if free disk space below this
MIN_DISK_MB = 100

# Max training memory (in MB) — abort if estimated memory exceeds this
MAX_TRAIN_MEMORY_MB = 512

# RAM monitor interval — check every N epochs
RAM_CHECK_INTERVAL = 10

# Pause behavior — wait N seconds between RAM rechecks
RAM_PAUSE_WAIT_SEC = 5

# Max pause retries before aborting (total wait = retries * pause_sec)
RAM_PAUSE_MAX_RETRIES = 6
